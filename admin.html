<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN CONTROL CENTER SPMB</title>

<!-- Halaman ini untuk PC desktop panitia/admin (bukan videotron). Orientasi landscape. -->

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
  min-height: 100vh;
  color: white;
  padding: 20px;
}

.header { text-align: center; margin-bottom: 25px; }
.header h1 { font-size: 42px; font-weight: 900; }
.header p { color: #cbd5e1; margin-top: 10px; }

.current {
  max-width: 1200px;
  margin: auto;
  background: rgba(255,255,255,.08);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 30px;
  text-align: center;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,.15);
}

.currentTitle { font-size: 22px; margin-bottom: 10px; }

.currentNumber {
  font-size: 90px;
  font-weight: 900;
  color: #00ff99;
  text-shadow: 0 0 30px rgba(0,255,153,.5);
}

.currentInfo { margin-top: 10px; font-size: 18px; color: #cbd5e1; }

.actions {
  max-width: 1200px;
  margin: auto;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin-bottom: 25px;
}

.btn {
  border: none;
  padding: 15px 30px;
  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: .25s;
}

.btn:hover { transform: translateY(-2px); }

.btn-danger  { background: #ef4444; color: white; }
.btn-warning { background: #f59e0b; color: white; }
.btn-success { background: #22c55e; color: white; }

.monitor {
  max-width: 1400px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
}

.card {
  background: rgba(255,255,255,.08);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  border: 1px solid rgba(255,255,255,.15);
  transition: .3s;
}

.card:hover { transform: translateY(-4px); }
.card h3 { margin-bottom: 10px; font-size: 24px; }

.nomor {
  font-size: 42px;
  font-weight: 900;
  color: #00ff99;
  margin-bottom: 10px;
}

.status { font-size: 14px; color: #cbd5e1; }

.footer {
  text-align: center;
  margin-top: 25px;
  color: #94a3b8;
  font-size: 14px;
}

@media (max-width: 1200px) {
  .monitor { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 768px) {
  .monitor { grid-template-columns: repeat(2, 1fr); }
  .currentNumber { font-size: 60px; }
}
</style>
</head>

<body>

<div class="header">
  <h1>ADMIN CONTROL CENTER</h1>
  <p id="subHeader">Sistem Antrean Verifikasi SPMB</p>
</div>

<div class="current">
  <div class="currentTitle">ANTREAN TERPANGGIL</div>
  <div id="currentNumber" class="currentNumber">---</div>
  <div id="currentInfo" class="currentInfo">Menunggu panggilan...</div>
</div>

<div class="actions">
  <button class="btn btn-warning" onclick="resetDisplay()">RESET DISPLAY</button>
  <button class="btn btn-danger" onclick="resetAllData()">RESET SEMUA LOKET</button>
</div>

<div id="monitor" class="monitor"></div>

<div class="footer">Realtime Firebase Monitoring</div>

<script type="module">
import { listenCurrentCall, listenLoket, resetAll, daftarLoket } from "./js/app.js";
import { db, ref, update } from "./js/firebase.js";
import { TAHUN_AJARAN } from "./js/config.js";

document.getElementById("subHeader").textContent =
  `Sistem Antrean Verifikasi SPMB ${TAHUN_AJARAN}`;

/* CURRENT CALL */
listenCurrentCall((data) => {
  if (!data) return;

  document.getElementById("currentNumber").innerText = data.nomor || "---";
  document.getElementById("currentInfo").innerText =
    `LOKET : ${data.loket || "-"} | STATUS : ${data.callType || "-"}`;
});

/* LOKET MONITOR — dibangun dari daftarLoket (config.js) */
listenLoket((data) => {
  const monitor = document.getElementById("monitor");
  monitor.innerHTML = "";

  daftarLoket.forEach((k) => {
    const nomor = data?.[k] || "000";
    monitor.innerHTML += `
      <div class="card">
        <h3>MEJA ${k}</h3>
        <div class="nomor">${k}-${nomor}</div>
        <div class="status">Realtime Monitoring</div>
      </div>
    `;
  });
});

/* RESET DISPLAY (hanya tampilan panggilan aktif) */
window.resetDisplay = async () => {
  if (!confirm("Reset display videotron?")) return;

  await update(ref(db), {
    "current_call/nomor": "---",
    "current_call/loket": "-",
    "current_call/counter": 0,
    "current_call/callType": "RESET",
    "current_call/updatedAt": Date.now(),
  });
};

/* RESET SEMUA LOKET */
window.resetAllData = async () => {
  if (!confirm("Reset seluruh antrean?")) return;
  await resetAll();
  alert("Seluruh antrean berhasil direset");
};
</script>

</body>
</html>
