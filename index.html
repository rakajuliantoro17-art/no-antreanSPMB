<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  color:white;
  background:url("./assets/bg.jpg") no-repeat center center fixed;
  background-size:cover;
}

.logo{
  position:absolute;
  top:20px;
  left:20px;
  width:120px;
  z-index:10;
}

.container{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.label{
  font-size:45px;
  font-weight:bold;
  color:#94a3b8;
}

.nomor{
  font-size:180px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 30px rgba(0,255,153,.7);
}

.info{
  font-size:28px;
  color:#cbd5e1;
}

.blink{
  animation:blink .8s infinite alternate;
}

@keyframes blink{
  from{opacity:1}
  to{opacity:.4}
}
</style>
</head>

<body>

<img src="./assets/logo.png" class="logo">

<div class="container">
  <div class="label">NOMOR ANTREAN</div>
  <div class="nomor blink" id="nomor">---</div>
  <div class="info">HARAP MENUJU LOKET PELAYANAN</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462512",
  appId: "1:357121462512:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const nomorEl = document.getElementById("nomor");
let lastNomor = "";

// unlock audio browser
document.body.addEventListener("click", () => {
  new Audio("./sounds/ding.mp3").play().catch(()=>{});
}, { once:true });

// suara text
function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "id-ID";
  speechSynthesis.speak(u);
}

// format suara
function suaraAntrean(nomor){
  if(!nomor || !nomor.includes("-")) return "";

  const [huruf, angka] = nomor.split("-");
  const angkaText = parseInt(angka).toString().split("").join(" ");

  return `Nomor antrean ${huruf} ${angkaText}, silahkan menuju loket pelayanan`;
}

// ding sound
function playDing(){
  const audio = new Audio("./sounds/ding.mp3");
  audio.play();
}

// realtime listener
onValue(ref(db, "current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor || "---";
  nomorEl.innerText = nomor;

  if(nomor !== lastNomor){
    lastNomor = nomor;

    setTimeout(()=>{
      speak(suaraAntrean(nomor));
      playDing();
    }, 500);
  }

});

</script>

</body>
</html>
