<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:Army;
  background:url("./assets/th.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter: blur(5px);
}

.logo{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:clamp(100px, 12vw, 175px);
  z-index:10;
  object-fit:contain;

  /* 🔥 EMBOSS EFFECT */
  box-shadow:
    0 6px 15px rgba(0,0,0,0.45),
    inset 0 2px 4px rgba(255,255,255,0.25),
    inset 0 -3px 6px rgba(0,0,0,0.35);

  /* ✨ GLOW HALUS */
  filter:
    drop-shadow(0 0 8px rgba(0,255,200,0.35))
    drop-shadow(0 0 18px rgba(0,255,200,0.15));

  /* 💎 sedikit “glass feel” */
  backdrop-filter: blur(5px);

  transition:0.3s ease;
}

/* hover optional (kalau di TV tidak kepakai, aman) */
.logo:hover{
  transform:translateX(-50%) scale(1.03);
  filter:
    drop-shadow(0 0 12px rgba(0,255,200,0.5))
    drop-shadow(0 0 25px rgba(0,255,200,0.2));
}
  
/* CLOCK RGB GAMING */
.clock{
  font-size:48px;
  letter-spacing:4px;
  margin-bottom:15px;
  font-weight:700;

  background:linear-gradient(90deg,#ff00ff,#00ffff,#39ff14,#ffcc00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rgb 3s infinite linear;
  text-shadow:0 0 20px rgba(0,255,255,0.4);
}

@keyframes rgb{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}
  
.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.glass{
  padding:75px 100px;
  border-radius:40px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  text-align:center;
  border:3px solid rgba(255,255,255,0.2);
}

.nomor{
  font-size:200px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 30px rgba(0,255,153,0.5);
}

.info{
  font-size:36px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="overlay"></div>
<img src="./assets/logo.png" class="logo">
  
<div class="container">
  <div class="glass">
    <div class="clock" id="clock">00:00:00</div>
    <div class="info">NOMER ANTREAN</div>
    <div class="nomor" id="nomor">---</div>
    <div class="info">SILAHKAN MENUJU MEJA PELAYANAN</div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462357",
  appId: "1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const el = document.getElementById("nomor");
let lastNomor = "";

/* PETUGAS */
const petugas = {
  A:"Bapak Rahmad",
  B:"Bapak Bayu",
  C:"Bapak Sunariyadi",
  D:"Ibu Tasya",
  E:"Ibu Eva",
  F:"Bapak Mujib",
  G:"Ibu Ria",
  H:"Bapak Raka",
  I:"Bapak Chozin",
  J:"Ibu Ita"
};

/* AUDIO UNLOCK */
document.body.addEventListener("click", () => {
  speechSynthesis.speak(new SpeechSynthesisUtterance(""));
  new Audio("./sounds/ding.mp3").play().catch(()=>{});
}, { once:true });

/* FORMAT ANNOUNCEMENT */
function format(loket, angka, nama){

  const digit = angka.split("").join(" ");

  const id =
`Nomor antrean ${loket} ${digit}.
Silakan menuju Loket pelayanan Verifikasi SPMB tahun 2026 di meja ${nama}.`;
  
  const en =
`Turn number ${loket} ${digit}.
Please proceed to SPMB 2026 verification counter at ${nama}.`;

  return id + " ... " + en;
}

let voicesReady = false;

/* ================= LOAD VOICE (STABLE) ================= */
function loadVoice(){
  speechSynthesis.getVoices();
  voicesReady = true;
}

speechSynthesis.onvoiceschanged = loadVoice;
loadVoice();

/* ================= BANK / AIRPORT FEMALE VOICE ================= */
function speak(text){

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  // 🔒 FIX: pakai FEMALE default browser (tidak dipaksakan aneh)
  const voice =
    voices.find(v => v.lang === "id-ID") ||
    voices.find(v => v.lang.startsWith("id")) ||
    voices.find(v => v.lang === "en-US") ||
    voices.find(v => v.lang.startsWith("en")) ||
    voices[0];

  if(voice) u.voice = voice;

  // 🎯 STYLE BANK / BANDARA
  u.lang = "id-ID";
  u.rate = 0.9;     // jelas, tidak cepat
  u.pitch = 1.0;    // netral female
  u.volume = 1;

  speechSynthesis.cancel();

  setTimeout(()=>{
    speechSynthesis.speak(u);
  }, 120);
}

/* DING */
function ding(){
  new Audio("./sounds/ding.mp3").play();
}
function updateClock(){

  const now = new Date();

  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');

  document.getElementById("clock").innerText = `${h}:${m}:${s}`;
}

setInterval(updateClock, 1000);
updateClock();
  
/* FIREBASE LISTENER */
onValue(ref(db,"current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor;
  const type = data.callType || "NEXT";

  if(nomor === lastNomor && type !== "RECALL") return;

  lastNomor = nomor;
  el.innerText = nomor;

  const [loket, angka] = nomor.split("-");
  const nama = petugas[loket] || "petugas layanan";

  setTimeout(()=>{

    ding();

    if(type === "RECALL"){
      const recall =
        "Attention please. Pengulangan panggilan. " +
        format(loket, angka, nama) +
        " We repeat the announcement.";
      speak(recall);
    } else {
      speak(format(loket, angka, nama));
    }

  }, 500);

});

</script>

</body>
</html>
