<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN BANK STYLE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("./assets/bg.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
}

.logo{
  position:absolute;
  top:20px;
  left:20px;
  width:120px;
}

.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.glass{
  padding:60px 90px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  text-align:center;
  border:1px solid rgba(255,255,255,0.2);
}

.label{
  font-size:26px;
  color:#cbd5e1;
  letter-spacing:4px;
}

.nomor{
  font-size:170px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 30px rgba(0,255,153,0.5);
}

.info{
  font-size:22px;
  margin-top:10px;
}

.blink{animation:blink 1s infinite alternate;}
@keyframes blink{from{opacity:1}to{opacity:.6}}
</style>
</head>

<body>

<div class="overlay"></div>
<img src="./assets/logo.png" class="logo">

<div class="container">
  <div class="glass">
    <div class="label">NOMOR ANTREAN</div>
    <div class="nomor blink" id="nomor">---</div>
    <div class="info">SILAHKAN MENUJU LOKET PELAYANAN</div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462512",
  appId: "1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const el = document.getElementById("nomor");

let last = "";

/* ================= SOUND ================= */
function playDing(){
  new Audio("./sounds/ding.mp3").play();
}

/* ================= JAPAN GEN Z VOICE ================= */
function speak(text){

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();
  const jp = voices.find(v => v.lang.includes("ja"));

  if(jp) u.voice = jp;

  u.lang = "id-ID";
  u.rate = 1.15;
  u.pitch = 1.35;
  u.volume = 1;

  speechSynthesis.speak(u);
}

/* ================= FORMAT ================= */
function format(nomor){

  if(!nomor || !nomor.includes("-")) return "";

  const [h,a] = nomor.split("-");
  const angka = a.split("").join(" ");

  return `Nomor antrean ${h} ${angka}, silahkan menuju konter layanan Verifikasi SPMB 2026`;
}

/* ================= FIREBASE LISTENER ================= */
onValue(ref(db,"current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor;
  const type = data.callType || "NEXT";

  el.innerText = nomor;

  if(nomor !== last){

    last = nomor;

    setTimeout(()=>{

      playDing();

      if(type === "RECALL"){
        speak("Pengulangan panggilan. " + format(nomor));
      } else {
        speak(format(nomor));
      }

    },500);

  }

});

</script>

</body>
</html>
