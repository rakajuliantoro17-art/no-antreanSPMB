<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ANTREAN BANK STYLE</title>

<style>
/* ================= BACKGROUND ================= */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
  color:white;
  background:url("./assets/bg.jpg") no-repeat center center fixed;
  background-size:cover;
}

/* overlay gelap + blur */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
}

/* logo */
.logo{
  position:absolute;
  top:20px;
  left:20px;
  width:120px;
  z-index:10;
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.6));
}

/* container glass */
.container{
  position:relative;
  z-index:2;
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* glass card */
.glass{
  padding:50px 80px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  backdrop-filter: blur(20px);
  text-align:center;
}

/* label */
.label{
  font-size:28px;
  letter-spacing:4px;
  color:#cbd5e1;
  margin-bottom:20px;
}

/* nomor besar */
.nomor{
  font-size:160px;
  font-weight:900;
  color:#00ff99;
  text-shadow:
    0 0 20px rgba(0,255,153,0.6),
    0 0 40px rgba(0,255,153,0.4);
}

/* info */
.info{
  margin-top:20px;
  font-size:22px;
  color:#e2e8f0;
}

/* animasi halus */
.blink{
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:1}
  to{opacity:0.6}
}
</style>
</head>

<body>

<div class="overlay"></div>

<img src="./assets/logo.png" class="logo">

<div class="container">

  <div class="glass">

    <div class="label">NOMOR ANTREAN</div>

    <div class="nomor blink" id="nomor">---</div>

    <div class="info">SILAHKAN MENUJU LOKET PELAYANAN</div>

  </div>

</div>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462512",
  appId: "1:357121462512:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= ELEMENT =================
const nomorEl = document.getElementById("nomor");
let lastNomor = "";

// ================= AUDIO UNLOCK =================
document.body.addEventListener("click", () => {
  const a = new Audio("./sounds/ding.mp3");
  a.play().catch(()=>{});
}, { once:true });

// ================= VOICE =================
function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "id-ID";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ================= FORMAT =================
function formatNomor(nomor){
  if(!nomor || !nomor.includes("-")) return "";

  const [huruf, angka] = nomor.split("-");
  const angkaText = angka.split("").join(" ");

  return `Nomor antrean ${huruf} ${angkaText}, silahkan menuju loket pelayanan`;
}

// ================= SOUND =================
function playDing(){
  const audio = new Audio("./sounds/ding.mp3");
  audio.play();
}

// ================= REALTIME =================
onValue(ref(db, "current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor || "---";
  nomorEl.innerText = nomor;

  if(nomor !== lastNomor){
    lastNomor = nomor;

    setTimeout(()=>{
      speak(formatNomor(nomor));
      playDing();
    }, 500);
  }

});
onValue(ref(db,"current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  nomorEl.innerText = data.nomor;

  const type = data.callType || "NEXT";

  if(data.nomor !== lastNomor){

    lastNomor = data.nomor;

    playDing();

    if(type === "RECALL"){
      speak("Pengulangan panggilan. " + format(data.nomor));
    } else {
      speak(format(data.nomor));
    }

  }

});
</script>

</body>
</html>
