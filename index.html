```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISPLAY ANTREAN SPMB 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:url("./assets/th.jpg") center center no-repeat fixed;
background-size:cover;
overflow:hidden;
color:white;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(6px);
z-index:0;
}

/* ================= HEADER ================= */

.header{
position:absolute;
top:10px;
left:0;
width:100%;
text-align:center;
z-index:5;
}

.logo{
width:140px;
height:auto;
margin-bottom:8px;
}

.title{
font-size:42px;
font-weight:900;
letter-spacing:2px;
text-shadow:0 0 20px rgba(255,255,255,.4);
}

.subtitle{
font-size:20px;
opacity:.9;
}

.clock{
margin-top:10px;
font-size:64px;
font-weight:900;

background:linear-gradient(
90deg,
#ff00ff,
#00ffff,
#39ff14,
#ffcc00,
#ff00ff
);

background-size:400% 400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:rgbmove 6s linear infinite;
}

@keyframes rgbmove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* ================= MAIN ================= */

.main{
position:relative;
z-index:2;

width:95vw;
height:88vh;

margin:auto;
margin-top:90px;

border-radius:40px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:2px solid rgba(255,255,255,.2);

display:flex;
flex-direction:column;
justify-content:space-between;

padding:25px;
}

/* ================= NOMOR ================= */

.center{
text-align:center;
}

.label{
font-size:52px;
font-weight:700;
letter-spacing:4px;
}

.nomor{
font-size:320px;
font-weight:900;
line-height:1;

color:#00ff99;

text-shadow:
0 0 20px rgba(0,255,153,.7),
0 0 60px rgba(0,255,153,.6),
0 0 120px rgba(0,255,153,.3);

animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.03);
}
}

.petugasAktif{
font-size:48px;
font-weight:700;
margin-top:10px;
}

/* ================= GRID KONTER ================= */

.counter-grid{

display:grid;

grid-template-columns:
repeat(10,1fr);

gap:10px;

margin-top:10px;
}

.counter-card{

height:170px;

border-radius:20px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-weight:700;

transition:.4s;

box-shadow:
0 8px 20px rgba(0,0,0,.35);
}

.counter-card.active{

transform:scale(1.12);

border:4px solid white;

box-shadow:
0 0 25px white,
0 0 60px white;

animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.65}
100%{opacity:1}
}

.card-A{background:#e74c3c;}
.card-B{background:#e67e22;}
.card-C{background:#f1c40f;color:#111;}
.card-D{background:#2ecc71;}
.card-E{background:#1abc9c;}
.card-F{background:#3498db;}
.card-G{background:#6c5ce7;}
.card-H{background:#9b59b6;}
.card-I{background:#e84393;}
.card-J{background:#636e72;}

.counter-loket{
font-size:22px;
}

.counter-number{
font-size:52px;
font-weight:900;
margin:5px 0;
}

.counter-petugas{
font-size:18px;
text-align:center;
padding:0 5px;
}

/* ================= RUNNING TEXT ================= */

.marquee{

height:60px;

overflow:hidden;

border-radius:15px;

background:rgba(0,0,0,.5);

display:flex;
align-items:center;
}

.marquee span{

white-space:nowrap;

font-size:28px;
font-weight:700;

padding-left:100%;

animation:running 25s linear infinite;
}

@keyframes running{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="header">

<img src="./assets/logo.png" class="logo">

<div class="title">
VERIFIKASI SPMB SMAN 1 SOOKO
</div>

<div class="subtitle">
TAHUN PELAJARAN 2026/2027
</div>

<div class="clock" id="clock">
00:00:00
</div>

</div>

<div class="main">

<div class="center">

<div class="label">
NOMOR ANTREAN
</div>

<div class="nomor" id="nomor">
---
</div>

<div class="petugasAktif" id="petugasAktif">
SILAHKAN MENUJU MEJA PELAYANAN
</div>

</div>

<div class="counter-grid" id="counterGrid"></div>

<div class="marquee">
<span>
SELAMAT DATANG DI LAYANAN VERIFIKASI SPMB SMAN 1 SOOKO • SIAPKAN BERKAS ASLI DAN FOTOKOPI • IKUTI PETUNJUK PETUGAS •
</span>
</div>

</div>

<script type="module">

/* TEMPELKAN FIREBASE CONFIG MILIK ANDA DI SINI */

const petugas = {
A:"Bapak Rahmad",
B:"Bapak Bayu",
C:"Bapak Sunariyadi",
D:"Ibu Tasya",
E:"Ibu Eva",
F:"Bapak Mujib",
G:"Ibu Ria",
H:"Bapak Raka",
I:"Bapak Chozin",
J:"Ibu Ita"
};

const counters = {
A:"000",
B:"000",
C:"000",
D:"000",
E:"000",
F:"000",
G:"000",
H:"000",
I:"000",
J:"000"
};

function renderCounters(active=""){

const grid =
document.getElementById("counterGrid");

grid.innerHTML="";

Object.keys(counters).forEach(k=>{

const card =
document.createElement("div");

card.className =
`counter-card card-${k} ${
active===k ? "active" : ""
}`;

card.innerHTML=`
<div class="counter-loket">MEJA ${k}</div>
<div class="counter-number">${k}-${counters[k]}</div>
<div class="counter-petugas">${petugas[k]}</div>
`;

grid.appendChild(card);

});

}

renderCounters();

/* JAM */

function updateClock(){

const now = new Date();

const h =
String(now.getHours()).padStart(2,"0");

const m =
String(now.getMinutes()).padStart(2,"0");

const s =
String(now.getSeconds()).padStart(2,"0");

document.getElementById("clock")
.innerText =
`${h}:${m}:${s}`;

}

setInterval(updateClock,1000);
updateClock();

/*
DI LISTENER FIREBASE ANDA
TAMBAHKAN:

counters[loket] = angka;

renderCounters(loket);

document.getElementById("nomor")
.innerText = nomor;

document.getElementById("petugasAktif")
.innerText =
"Silahkan menuju meja " + nama;

*/

</script>

</body>
</html>
```
