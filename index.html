<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISPLAY ANTREAN SPMB</title>

<link rel="stylesheet" href="style.css">

<style>
/* tambahan layout frame utama */
.frame {
  width: 95vw;
  height: 85vh;
  margin: 90px auto 0;
  padding: 20px;
  border-radius: 30px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);

  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.top-info {
  text-align: center;
}

.nomor {
  font-size: 220px;
  font-weight: 900;
  color: #00ff99;
  text-shadow: 0 0 40px rgba(0,255,153,0.6);
}

.petugasAktif {
  font-size: 42px;
  margin-top: 10px;
  font-weight: bold;
}

/* GRID 10 MEJA */
.counter-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 10px;
}

.counter-card {
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  font-weight: bold;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.2s;
}

.counter-card.active {
  transform: scale(1.08);
  border: 2px solid #fff;
  box-shadow: 0 0 20px #fff;
}

.card-A{background:#e74c3c;}
.card-B{background:#e67e22;}
.card-C{background:#f1c40f;color:black;}
.card-D{background:#2ecc71;}
.card-E{background:#1abc9c;}
.card-F{background:#3498db;}
.card-G{background:#6c5ce7;}
.card-H{background:#9b59b6;}
.card-I{background:#e84393;}
.card-J{background:#636e72;}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- HEADER -->
<div class="header">
  <img src="./assets/logo.png" class="logo">
  <div class="title">VERIFIKASI SPMB SMAN 1 SOOKO</div>
  <div class="subtitle">TAHUN PELAJARAN 2026/2027</div>
  <div class="clock" id="clock">00:00:00</div>
</div>

<!-- FRAME UTAMA -->
<div class="frame">

  <!-- TOP INFO -->
  <div class="top-info">
    <div class="label">NOMOR ANTREAN</div>
    <div class="nomor" id="nomor">---</div>
    <div class="petugasAktif" id="petugasAktif">
      SILAHKAN MENUJU MEJA PELAYANAN
    </div>
  </div>

  <!-- GRID 10 MEJA -->
  <div class="counter-grid" id="counterGrid"></div>

  <!-- RUNNING TEXT -->
  <div class="marquee">
    <span>
      SELAMAT DATANG • SIAPKAN BERKAS ASLI • IKUTI PETUGAS • LAYANAN SPMB SMAN 1 SOOKO •
    </span>
  </div>

</div>

<script type="module">
import { listenDisplay, initSystem } from "./firebase.js";

/* INIT SYSTEM */
await initSystem();

/* CLOCK */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0") + ":" +
    String(now.getSeconds()).padStart(2,"0");
}
setInterval(updateClock, 1000);
updateClock();

/* PETUGAS FIX */
const petugas = {
  A:"Rahmad", B:"Bayu", C:"Sunariyadi",
  D:"Tasya", E:"Eva",
  F:"Mujib", G:"Ria", H:"Raka",
  I:"Chozin", J:"Ita"
};

/* REALTIME LISTENER */
listenDisplay((data) => {
  if (!data || !data.current) return;

  const c = data.current;

  /* NOMOR UTAMA */
  document.getElementById("nomor").innerText =
    `${c.loket}-${String(c.nomor).padStart(3,"0")}`;

  document.getElementById("petugasAktif").innerText =
    `LOKET ${c.loket} SIAP MELAYANI`;

  /* GRID UPDATE */
  const grid = document.getElementById("counterGrid");
  grid.innerHTML = "";

  const counters = data.counters || {};

  Object.keys(petugas).forEach(k => {
    const div = document.createElement("div");

    div.className = "counter-card card-" + k;

    if (c.loket === k) div.classList.add("active");

    div.innerHTML = `
      <div>MEJA ${k}</div>
      <div>${k}-${String(counters[k] || 0).padStart(3,"0")}</div>
      <div>${petugas[k]}</div>
    `;

    grid.appendChild(div);
  });
});
</script>

</body>
</html>
