<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}
.nomor{
  font-size:100px;
  text-align:center;
  margin-top:20vh;
}
</style>
</head>

<body>

<div class="nomor" id="nomor">LOADING...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462357",
  appId: "1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const el = document.getElementById("nomor");

let lastNomor = "";

/* FORMAT ANNOUNCEMENT (WAJIB DI SINI) */
function formatAnnouncement(loket, angka, namaPetugas){

  const digit = angka.split("").join(" ");

  const id =
    `Nomor antrean ${loket} ${digit}, silakan menuju loket pelayanan Verifikasi SPMB tahun 2026 di meja ${namaPetugas}.`;

  const en =
    `Queue number ${loket} ${digit}, please proceed to the SPMB 2026 verification service counter at ${namaPetugas} desk.`;

  return id + " " + en;
}

/* VOICE */
function speak(text){
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "id-ID";
  u.rate = 0.9;

  speechSynthesis.speak(u);
}

/* FIREBASE LISTENER */
onValue(ref(db,"current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor;

  if(nomor !== lastNomor){

    lastNomor = nomor;

    el.innerText = nomor;

    const [loket, angka] = nomor.split("-");
    const nama = "petugas layanan";

    speak(formatAnnouncement(loket, angka, nama));
  }

});

</script>

</body>
</html>
