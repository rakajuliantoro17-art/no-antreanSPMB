<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN SPMB</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020617;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
  color:white;
}

.container{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.label{
  font-size:45px;
  font-weight:bold;
  letter-spacing:3px;
  margin-bottom:20px;
  color:#94a3b8;
}

.nomor{
  font-size:180px;
  font-weight:900;
  color:#00ff99;
  text-shadow:
    0 0 20px rgba(0,255,153,.7),
    0 0 40px rgba(0,255,153,.5);
}

.info{
  margin-top:30px;
  font-size:28px;
  color:#cbd5e1;
}

.blink{
  animation:blink .8s infinite alternate;
}

@keyframes blink{
  from{opacity:1}
  to{opacity:.4}
}
</style>
</head>

<body>

<div class="container">

  <div class="label">NOMOR ANTREAN</div>

  <div class="nomor blink" id="nomor">---</div>

  <div class="info">HARAP MENUJU LOKET PELAYANAN</div>

</div>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462512",
  appId: "1:357121462512:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= ELEMENT =================
const nomorEl = document.getElementById("nomor");
let lastNomor = "";

// ================= UNLOCK AUDIO (WAJIB BROWSER) =================
document.body.addEventListener("click", () => {
  const unlock = new SpeechSynthesisUtterance("");
  speechSynthesis.speak(unlock);
}, { once:true });

// ================= SUARA =================
function speak(text){
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "id-ID";
  speech.rate = 0.9;
  speech.pitch = 1;
  speech.volume = 1;
  window.speechSynthesis.speak(speech);
}

// ================= FORMAT SUARA =================
function suaraAntrean(nomor){
  if(!nomor || !nomor.includes("-")) return "Nomor antrean tidak tersedia";

  const parts = nomor.split("-");
  const huruf = parts[0];
  const angka = parseInt(parts[1]);

  const angkaText = angka.toString().split("").join(" ");

  return `Nomor antrean ${huruf} ${angkaText}, silahkan menuju loket pelayanan`;
}

// ================= REALTIME LISTENER =================
onValue(ref(db, "current_call"), (snapshot) => {

  const data = snapshot.val();
  if(!data) return;

  const nomor = data.nomor || "---";
  nomorEl.innerText = nomor;

  // hindari suara berulang
  if(nomor !== lastNomor){
    lastNomor = nomor;

    setTimeout(() => {
      speak(suaraAntrean(nomor));
    }, 500);
  }

});

</script>

</body>
</html>
