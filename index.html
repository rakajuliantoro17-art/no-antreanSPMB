<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIDEOTRON ANTREAN SPMB 2026</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Segoe UI,Arial,sans-serif;
background:url("./assets/th.jpg") center/cover no-repeat;
}

/* DARK LAYER */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(6px);
}

/* LOGO */
.logo{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:160px;
z-index:10;
}

/* MAIN WRAPPER */
.wrapper{
position:relative;
z-index:2;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:140px;
}

/* CLOCK */
.clock{
font-size:72px;
font-weight:900;
background:linear-gradient(90deg,#ff00ff,#00ffff,#39ff14,#ffcc00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 4s linear infinite;
margin-bottom:20px;
}

@keyframes rgb{
from{filter:hue-rotate(0)}
to{filter:hue-rotate(360deg)}
}

/* MAIN BOX */
.main{
width:85%;
max-width:1600px;
text-align:center;
padding:50px;
border-radius:40px;
background:rgba(255,255,255,0.08);
border:2px solid rgba(255,255,255,0.2);
backdrop-filter:blur(18px);
}

/* TEXT */
.info{
font-size:42px;
font-weight:600;
margin-bottom:10px;
}

.nomor{
font-size:320px;
font-weight:900;
color:#00ff99;
text-shadow:0 0 25px #00ff99,0 0 60px #00ff99;
letter-spacing:10px;
transition:all .3s ease;
}

/* MARQUEE */
.marquee{
position:absolute;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,0.75);
padding:14px;
font-size:32px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
color:#fff;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:marquee 18s linear infinite;
}

@keyframes marquee{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}

/* CARDS */
.cards{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:96%;
display:grid;
grid-template-columns:repeat(10,1fr);
gap:14px;
}

.card{
padding:18px;
border-radius:20px;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
color:white;
backdrop-filter:blur(10px);
}

.card .meja{font-size:20px;font-weight:600}
.card .antri{font-size:52px;font-weight:900}
.card .petugas{font-size:14px}

.active{
border:3px solid #fff;
box-shadow:0 0 25px #fff,0 0 60px #fff;
transform:scale(1.05);
transition:all .3s ease;
}
</style>
</head>

<body>

<div class="overlay"></div>
<img src="./assets/logo.png" class="logo">

<div class="wrapper">
  <div class="clock" id="clock"></div>

  <div class="main">
    <div class="info">NOMOR ANTREAN</div>
    <div class="nomor" id="nomor">---</div>
    <div class="info">SILAHKAN MENUJU MEJA PELAYANAN</div>
  </div>
</div>

<div class="cards" id="cards"></div>

<div class="marquee">
  <span>SELAMAT DATANG DI LAYANAN VERIFIKASI SPMB 2026 SMAN 1 SOOKO MOJOKERTO</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
authDomain:"no-antrean-spmb.firebaseapp.com",
databaseURL:"https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"no-antrean-spmb",
storageBucket:"no-antrean-spmb.firebasestorage.app",
messagingSenderId:"357121462512",
appId:"1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* STATE */
let audioUnlocked = false;
let lastCall = "";

/* UNLOCK AUDIO */
document.body.addEventListener("click", () => {
  speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
  audioUnlocked = true;
}, { once:true });

/* DATA */
const petugas = {
A:"Pak Rahmad",B:"Pak Bayu",C:"Pak Sunariyadi",D:"Bu Tasya",E:"Bu Eva",
F:"Pak Mujib",G:"Bu Ria",H:"Pak Raka",I:"Pak Chozin",J:"Bu Ita"
};

const colors=["#ef4444","#f97316","#eab308","#22c55e","#14b8a6","#06b6d4","#3b82f6","#8b5cf6","#d946ef","#ec4899"];

/* BUILD CARDS */
const cards = document.getElementById("cards");

Object.keys(petugas).forEach((m,i)=>{
 const d=document.createElement("div");
 d.className="card";
 d.id="card"+m;
 d.style.background=colors[i]+"55";
 d.innerHTML=`
 <div class="meja">MEJA ${m}</div>
 <div class="antri" id="n${m}">000</div>
 <div class="petugas">${petugas[m]}</div>
 `;
 cards.appendChild(d);
});

/* CLOCK */
setInterval(()=>{
 document.getElementById("clock").textContent =
 new Date().toLocaleTimeString("id-ID");
},1000);

/* SOUND */
function ding(){
 new Audio("./sounds/ding.mp3").play();
}

function speak(text){
 if(!audioUnlocked) return;

 speechSynthesis.cancel();

 const u = new SpeechSynthesisUtterance(text);
 const voices = speechSynthesis.getVoices();

 u.voice = voices.find(v=>v.lang.includes("id")) || voices[0];

 u.lang="id-ID";
 u.rate=0.78;   // lebih pelan = lebih jelas di speaker besar
 u.pitch=1.0;
 u.volume=1;

 speechSynthesis.speak(u);
}

/* TEXT BUILDER */
function buildCall(data){
 const nomor = data.nomor || "";
 const angka = nomor.includes("-") ? nomor.split("-")[1] : nomor;

 const loket = data.loket;
 const petugasNama = petugas[loket] || "petugas layanan";

 return `Nomor antrean ${angka}. 
Silakan menuju meja ${loket}. 
Untuk verifikasi S P M B 2026. 
Dilayani oleh ${petugasNama}.`;
}

/* FIREBASE */
onValue(ref(db,"loket"),snap=>{
 const data=snap.val()||{};
 Object.keys(petugas).forEach(k=>{
  const el=document.getElementById("n"+k);
  if(el) el.textContent=data[k]||"000";
 });
});

onValue(ref(db,"current_call"),snap=>{
 const data=snap.val();
 if(!data) return;

 document.getElementById("nomor").innerText = data.nomor || "---";

 document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));

 if(data.loket){
  document.getElementById("card"+data.loket)?.classList.add("active");
 }

 const key = data.nomor + "_" + data.updatedAt;
 if(key === lastCall) return;
 lastCall = key;

 setTimeout(()=>{
  ding();
  speak(buildCall(data));
 },600);
});
</script>

</body>
</html>
