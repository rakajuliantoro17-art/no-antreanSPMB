<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://static.promediateknologi.id/crop/0x0:0x0/x/photo/p1/290/2024/01/02/Syarifah-Khadijah-Alhabsyi-Siapa_-Ini-Profil-Biodata-Gadis-yang-Viral-di-TikTok-Umur-Asal-Sekolah-Instagram-dan-TikTok-2-199858789.jpg') center/cover no-repeat;
  position:relative;
  overflow:hidden;
}

body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(10,25,47,0.65);
  backdrop-filter:blur(4px);
  z-index:1;
}

.logo{
  position:absolute;
  top:20px;
  left:20px;
  width:120px;
  z-index:10;
}

.box{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
}

.nomor{
  font-size:160px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 30px rgba(0,255,153,0.4);
}

.info{
  font-size:22px;
  margin-top:10px;
  opacity:0.9;
}
</style>
</head>

<body>

<img src="./assets/logo.png" class="logo">

<div class="box">
  <div class="nomor" id="nomor">---</div>
  <div class="info">Silakan menunggu panggilan...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462357",
  appId: "1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const el = document.getElementById("nomor");

let lastNomor = "";

/* ================= PETUGAS ================= */
const petugas = {
  A:"Bapak Rahmad",
  B:"Bapak Bayu",
  C:"Bapak Sunariyadi",
  D:"Ibu Tasya",
  E:"Ibu Eva",
  F:"Bapak Mujib",
  G:"Ibu Ria",
  H:"Bapak Raka",
  I:"Bapak Chozin",
  J:"Ibu Ita"
};

/* ================= UNLOCK AUDIO ================= */
document.body.addEventListener("click", () => {
  new Audio("./sounds/ding.mp3").play().catch(()=>{});
  speechSynthesis.speak(new SpeechSynthesisUtterance(""));
}, { once:true });

/* ================= FORMAT ================= */
function formatAnnouncement(loket, angka){

  const digit = angka.split("").join(" ");
  const nama = petugas[loket] || "petugas layanan";

  const id =
`Nomor antrean ${loket} ${digit}, silakan menuju loket pelayanan Verifikasi SPMB tahun 2026 di meja ${nama}.`;

  const en =
`Queue number ${loket} ${digit}, please proceed to verification service counter at ${nama} desk.`;

  return id + " ... " + en;
}

/* ================= VOICE ENGINE (BANK / AIRPORT STYLE) ================= */
function speak(text){

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  // 🔊 PRIORITY: English female / formal voice
  const voice =
    voices.find(v => v.lang.includes("en")) ||
    voices.find(v => v.lang.includes("id")) ||
    voices[0];

  if(voice) u.voice = voice;

  u.lang = "en-US";
  u.rate = 0.88;   // slow airport clarity
  u.pitch = 1.0;   // neutral (bank tone)
  u.volume = 1;

  setTimeout(()=>{
    speechSynthesis.speak(u);
  }, 150);
}

/* ================= FIREBASE ================= */
onValue(ref(db,"current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor;

  if(nomor === lastNomor) return;

  lastNomor = nomor;

  el.innerText = nomor;

  const [loket, angka] = nomor.split("-");

  const text = formatAnnouncement(loket, angka);

  // 🔊 bunyi + voice
  new Audio("./sounds/ding.mp3").play().catch(()=>{});
  speak(text);
});

</script>

</body>
</html>
