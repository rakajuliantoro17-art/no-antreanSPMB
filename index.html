<!DOCTYPE html>
<html>
<head>
  <title>DISPLAY ANTRIAN</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }

    .nomor {
      font-size: 120px;
      font-weight: bold;
      color: #00ff99;
    }

    .label {
      font-size: 30px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="label">SEDANG DIPANGGIL</div>
<div class="nomor" id="nomor">---</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const nomorEl = document.getElementById("nomor");

onValue(ref(db, "current_call"), (snap) => {
  const data = snap.val();
  if (data && data.nomor) {
    nomorEl.innerText = data.nomor;
  } else {
    nomorEl.innerText = "---";
  }
});
</script>

</body>
</html>
