<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DISPLAY ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("./assets/bg.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
}

.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.glass{
  padding:60px 90px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  text-align:center;
  border:1px solid rgba(255,255,255,0.2);
}

.nomor{
  font-size:160px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 30px rgba(0,255,153,0.5);
}

.info{
  font-size:22px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <div class="glass">
    <div class="nomor" id="nomor">---</div>
    <div class="info">SILAHKAN MENUJU LOKET PELAYANAN</div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462357",
  appId: "1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= PETUGAS LOKET ================= */
const petugas = {
  A: "Bapak Rahmad",
  B: "Bapak Bayu",
  C: "Bapak Sunariyadi",
  D: "Ibu Tasya",
  E: "Ibu Eva",
  F: "Bapak Mujib",
  G: "Ibu Ria",
  H: "Bapak Raka",
  I: "Bapak Chozin",
  J: "Ibu Ita"
};

const el = document.getElementById("nomor");
let lastNomor = "";

/* ================= AUDIO UNLOCK ================= */
document.body.addEventListener("click", () => {
  speechSynthesis.speak(new SpeechSynthesisUtterance(""));
  new Audio("./sounds/ding.mp3").play().catch(()=>{});
}, { once:true });

/* ================= FORMAT ================= */
function formatAnnouncement(loket, angka){

  const digit = angka.split("").join(" ");
  const nama = petugas[loket] || "petugas layanan";

  const id =
    `Nomor antrean ${loket} ${digit}, silakan menuju loket pelayanan Verifikasi SPMB tahun 2026 di meja ${nama}.`;

  const en =
    `Queue number ${loket} ${digit}, please proceed to SPMB 2026 verification service at ${nama} desk.`;

  return id + " . " + en;
}

/* ================= VOICE ENGINE (AIRPORT / BANK STYLE) ================= */
function speak(text){

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const voice =
    voices.find(v => v.lang.includes("en") && v.name.toLowerCase().includes("female")) ||
    voices.find(v => v.lang.includes("id")) ||
    voices[0];

  if(voice) u.voice = voice;

  u.lang = "en-US";
  u.rate = 0.9;   // airport slow
  u.pitch = 1.0;  // formal
  u.volume = 1;

  speechSynthesis.cancel();

  setTimeout(()=>{
    speechSynthesis.speak(u);
  }, 120);
}

/* ================= SOUND ================= */
function ding(){
  new Audio("./sounds/ding.mp3").play();
}

/* ================= FIREBASE LISTENER ================= */
onValue(ref(db,"current_call"), (snap)=>{

  const data = snap.val();
  if(!data) return;

  const nomor = data.nomor;
  const type = data.callType || "NEXT";

  el.innerText = nomor;

  if(nomor !== lastNomor){

    lastNomor = nomor;

    setTimeout(()=>{

      ding();

      const [loket, angka] = nomor.split("-");

      const text = formatAnnouncement(loket, angka);

      if(type === "RECALL"){
        speak("Pengulangan panggilan. " + text);
      } else {
        speak(text);
      }

    }, 500);
  }

});

</script>

</body>
</html>
