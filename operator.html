<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OPERATOR ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{
  margin:20px 0;
}

.panel{
  padding:20px;
}

.loket-grid{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  max-width:600px;
  margin:0 auto;
}

button{
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.loket{
  background:#2563eb;
  color:white;
}

.loket.active{
  background:#22c55e;
}

.action{
  margin-top:20px;
}

.next{
  background:#22c55e;
  color:white;
  width:200px;
}

.recall{
  background:#f59e0b;
  color:white;
  width:200px;
  margin-left:10px;
}

.reset{
  background:#ef4444;
  color:white;
  width:200px;
  margin-top:10px;
}

.display{
  font-size:40px;
  margin:20px 0;
  color:#00ff99;
}
</style>
</head>

<body>

<h1>OPERATOR PANEL ANTREAN</h1>

<div class="display" id="current">LOKET: - | NOMOR: ---</div>

<div class="panel">

  <div class="loket-grid">
    <button class="loket" onclick="setLoket('A')">A</button>
    <button class="loket" onclick="setLoket('B')">B</button>
    <button class="loket" onclick="setLoket('C')">C</button>
    <button class="loket" onclick="setLoket('D')">D</button>
    <button class="loket" onclick="setLoket('E')">E</button>
    <button class="loket" onclick="setLoket('F')">F</button>
    <button class="loket" onclick="setLoket('G')">G</button>
    <button class="loket" onclick="setLoket('H')">H</button>
    <button class="loket" onclick="setLoket('I')">I</button>
    <button class="loket" onclick="setLoket('J')">J</button>
  </div>

  <div class="action">
    <button class="next" onclick="next()">NEXT</button>
    <button class="recall" onclick="recall()">RECALL</button>
  </div>

  <button class="reset" onclick="resetCounter()">RESET LOKET</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462512",
  appId: "1:357121462512:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= STATE =================
let loket = "-";
let counter = 0;

// ================= INIT LOAD =================
async function loadState(){
  const snap = await get(ref(db, "operator_state"));
  if(snap.exists()){
    const data = snap.val();
    loket = data.loket || "-";
    counter = data.counter || 0;
    updateDisplay();
  }
}

loadState();

// ================= SET LOKET =================
window.setLoket = async function(l){
  loket = l;

  const snap = await get(ref(db, "counter/" + loket));
  counter = snap.exists() ? snap.val() : 0;

  await saveState();

  updateDisplay();
};

// ================= NEXT =================
window.next = async function(){
  if(loket === "-"){
    alert("Pilih loket dulu!");
    return;
  }

  counter++;

  const nomor = `${loket}-${String(counter).padStart(3,"0")}`;

  await set(ref(db, "current_call"), {
    nomor: nomor,
    loket: loket,
    counter: counter,
    updatedAt: Date.now()
  });

  await set(ref(db, "counter/" + loket), counter);

  await saveState();

  updateDisplay();
};

// ================= RECALL =================
window.recall = async function(){
  const snap = await get(ref(db, "current_call"));
  if(snap.exists()){
    await set(ref(db, "current_call"), snap.val());
  }
};

// ================= RESET =================
window.resetCounter = async function(){
  if(confirm("Reset counter loket ini?")){
    counter = 0;
    await set(ref(db, "counter/" + loket), 0);
    await saveState();
    updateDisplay();
  }
};

// ================= SAVE STATE =================
async function saveState(){
  await set(ref(db, "operator_state"), {
    loket,
    counter
  });
}

// ================= DISPLAY =================
function updateDisplay(){
  document.getElementById("current").innerText =
    `LOKET: ${loket} | NOMOR: ${loket}-${String(counter).padStart(3,"0")}`;
}

// ================= REALTIME LISTEN (optional sync) =================
onValue(ref(db, "current_call"), (snap)=>{
  const data = snap.val();
  if(data){
    console.log("CALL:", data.nomor);
  }
});

</script>

</body>
</html>
