<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OPERATOR ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("./assets/bg.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
  color:white;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
}

.container{
  position:relative;
  z-index:2;
  padding:20px;
  text-align:center;
}

.glass{
  max-width:800px;
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
}

.display{
  font-size:28px;
  margin-bottom:20px;
  color:#00ff99;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

button{
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.loket{
  background:#2563eb;
  color:white;
}

.loket:hover{
  transform:scale(1.05);
}

.next{
  background:#22c55e;
  color:white;
  width:200px;
}

.recall{
  background:#f59e0b;
  color:white;
  width:200px;
}

.reset{
  background:#ef4444;
  color:white;
  width:200px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="glass">

    <h2>OPERATOR PANEL ANTREAN</h2>

    <div class="display" id="current">
      LOKET: - | NOMOR: ---
    </div>

    <div class="grid">
      <button class="loket" onclick="setLoket('A')">A</button>
      <button class="loket" onclick="setLoket('B')">B</button>
      <button class="loket" onclick="setLoket('C')">C</button>
      <button class="loket" onclick="setLoket('D')">D</button>
      <button class="loket" onclick="setLoket('E')">E</button>
      <button class="loket" onclick="setLoket('F')">F</button>
      <button class="loket" onclick="setLoket('G')">G</button>
      <button class="loket" onclick="setLoket('H')">H</button>
      <button class="loket" onclick="setLoket('I')">I</button>
      <button class="loket" onclick="setLoket('J')">J</button>
    </div>

    <br>

    <button class="next" onclick="next()">NEXT</button>
    <button class="recall" onclick="recall()">RECALL</button>
    <br>
    <button class="reset" onclick="resetCounter()">RESET</button>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW_Wh9ttPQ8vnwgnQFUMMEDc5QqwJe3GQ",
  authDomain: "no-antrean-spmb.firebaseapp.com",
  databaseURL: "https://no-antrean-spmb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-antrean-spmb",
  storageBucket: "no-antrean-spmb.firebasestorage.app",
  messagingSenderId: "357121462512",
  appId: "1:3571214628:web:8fd937bc2a8d2a3894b235"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let loket = "-";
let counter = 0;

// ================= SOUND =================
function playSound(path){
  const audio = new Audio(path);
  audio.play();
}

// ================= JAPANESE GEN Z VOICE =================
function speakJP(text){

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  // coba pakai voice Jepang
  const voices = speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang.includes("ja"));

  if(jpVoice){
    u.voice = jpVoice;
  }

  u.lang = "id-ID"; // fallback
  u.rate = 1.05;    // cepat (Gen Z feel)
  u.pitch = 1.3;     // tinggi (anime vibe)
  u.volume = 1;

  speechSynthesis.speak(u);
}

// ================= FORMAT VOICE =================
function formatVoice(nomor){
  if(!nomor) return "";

  const [huruf, angka] = nomor.split("-");
  const angkaText = angka.split("").join(" ");

  return `Nomor antrean ${huruf} ${angkaText}, silahkan menuju konter layanan Verifikasi SPMB 2026`;
}

// ================= SET LOKET =================
window.setLoket = async function(l){

  loket = l;

  const snap = await get(ref(db, "counter/" + loket));
  counter = snap.exists() ? snap.val() : 0;

  updateDisplay();
};

// ================= NEXT =================
window.next = async function(){

  if(loket === "-"){
    alert("Pilih loket dulu!");
    return;
  }

  counter++;

  const nomor = `${loket}-${String(counter).padStart(3,"0")}`;

  await set(ref(db, "current_call"), {
    nomor,
    loket,
    counter,
    updatedAt: Date.now()
  });

  await set(ref(db, "counter/" + loket), counter);

  playSound("./sounds/ding.mp3");
  updateDisplay();
};

// ================= RECALL =================
window.recall = async function(){

  const snap = await get(ref(db, "current_call"));

  if(!snap.exists()) return;

  const data = snap.val();

  playSound("./sounds/panggilan.mp3");

  setTimeout(()=>{
    speakJP(formatVoice(data.nomor));
  }, 800);
};

// ================= RESET =================
window.resetCounter = async function(){
  if(confirm("Reset counter?")){
    counter = 0;
    await set(ref(db, "counter/" + loket), 0);
    updateDisplay();
  }
};

// ================= DISPLAY =================
function updateDisplay(){
  document.getElementById("current").innerText =
    `LOKET: ${loket} | NOMOR: ${loket}-${String(counter).padStart(3,"0")}`;
}

// preload voices
speechSynthesis.onvoiceschanged = ()=>{};

</script>

</body>
</html>
