<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OPERATOR ANTREAN SPMB</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:url("./assets/bg.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(10px);
}

.container{
  position:relative;
  z-index:2;
  padding:20px;
  text-align:center;
}

.glass{
  max-width:900px;
  margin:20px auto;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);
}

h2{
  margin-bottom:20px;
}

.display{
  font-size:30px;
  margin-bottom:25px;
  color:#00ff99;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

button{
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  transition:.25s;
}

button:hover{
  transform:scale(1.05);
}

.loket{
  background:#2563eb;
  color:white;
}

.active{
  background:#00ff99 !important;
  color:black !important;
}

.next{
  background:#22c55e;
  width:220px;
  margin-top:10px;
}

.recall{
  background:#f59e0b;
  width:220px;
  margin-top:10px;
}

.reset{
  background:#ef4444;
  width:220px;
  margin-top:10px;
}

.action{
  margin-top:25px;
}

.status{
  margin-top:15px;
  font-size:18px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="glass">

<h2>OPERATOR PANEL ANTREAN SPMB</h2>

<div class="display" id="current">
LOKET : - | NOMOR : ---
</div>

<div class="grid">

<button id="btnA" class="loket" onclick="setLoket('A')">MEJA A</button>
<button id="btnB" class="loket" onclick="setLoket('B')">MEJA B</button>
<button id="btnC" class="loket" onclick="setLoket('C')">MEJA C</button>
<button id="btnD" class="loket" onclick="setLoket('D')">MEJA D</button>
<button id="btnE" class="loket" onclick="setLoket('E')">MEJA E</button>

<button id="btnF" class="loket" onclick="setLoket('F')">MEJA F</button>
<button id="btnG" class="loket" onclick="setLoket('G')">MEJA G</button>
<button id="btnH" class="loket" onclick="setLoket('H')">MEJA H</button>
<button id="btnI" class="loket" onclick="setLoket('I')">MEJA I</button>
<button id="btnJ" class="loket" onclick="setLoket('J')">MEJA J</button>

</div>

<div class="action">

<button class="next" onclick="next()">▶ NEXT</button>
<button class="recall" onclick="recall()">🔊 RECALL</button>
<br>
<button class="reset" onclick="resetCounter()">⛔ RESET</button>

</div>

<div class="status">
Realtime Firebase Connected
</div>

</div>

</div>

<script type="module">
import { db, ref, get, update } from "./firebase.js";

/* ================= STATE ================= */
let loket = "-";
let counter = 0;

/* ================= UI ================= */
function updateUI() {
  document.getElementById("current").innerText =
    `LOKET : ${loket} | NOMOR : ${loket}-${String(counter).padStart(3, "0")}`;
}

/* ================= HIGHLIGHT ================= */
function highlight() {
  document.querySelectorAll(".loket")
    .forEach(b => b.classList.remove("active"));

  const btn = document.getElementById("btn" + loket);
  if (btn) btn.classList.add("active");
}

/* ================= PILIH LOKET ================= */
window.setLoket = async (l) => {
  loket = l;

  try {
    const snap = await get(ref(db, `display/counters/${loket}`));
    counter = snap.exists() ? snap.val() : 0;
  } catch (e) {
    console.error(e);
    counter = 0;
  }

  updateUI();
  highlight();
};

/* ================= NEXT ================= */
window.next = async () => {
  if (loket === "-") {
    alert("Pilih loket dulu!");
    return;
  }

  counter++;

  try {
    await update(ref(db), {
      "display/current": {
        loket,
        nomor: counter,
        petugas: "-"
      },
      [`display/counters/${loket}`]: counter,
      lastUpdate: Date.now()
    });
  } catch (e) {
    console.error(e);
    alert("Firebase error");
    return;
  }

  updateUI();
};

/* ================= RECALL ================= */
window.recall = () => {
  alert("Recall tidak diperlukan (display realtime sudah otomatis)");
};

/* ================= RESET ================= */
window.resetCounter = async () => {
  if (!confirm("Reset semua antrean?")) return;

  try {
    await update(ref(db), {
      display: {
        current: {
          loket: "-",
          nomor: 0,
          petugas: "-"
        },
        counters: {
          A: 0, B: 0, C: 0, D: 0, E: 0,
          F: 0, G: 0, H: 0, I: 0, J: 0
        },
        lastUpdate: Date.now()
      }
    });
  } catch (e) {
    console.error(e);
  }

  loket = "-";
  counter = 0;

  updateUI();
  highlight();
};

/* ================= INIT ================= */
updateUI();
</script>
